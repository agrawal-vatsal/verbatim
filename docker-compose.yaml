services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: verbatim-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: verbatim
    ports:
      - "5433:5432"  # Using 5433 to avoid clashing with any local Postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verbatim"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: